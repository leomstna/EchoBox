<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBoxd</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <nav class="pill-nav">
        <div class="logo">MusicBoxd</div>
        <div class="nav-links">
            <a href="#" id="link-home">Home</a>
            <a href="#" id="link-explorar">Explorar</a>
            <a href="#" id="link-rede">Comunidade</a>
        </div>
        <div class="user-actions">
            <button id="login-btn" class="btn-primary">Entrar</button>
            <div id="user-menu" style="display: none; align-items: center; gap: 15px;">
                <img id="nav-pfp" src="https://via.placeholder.com/40" alt="Perfil" style="cursor: pointer;" title="Abrir Perfil">
                <button id="logout-btn" class="btn-ghost" title="Sair"><i class="ph ph-sign-out"></i></button>
            </div>
        </div>
    </nav>

    <header id="home" class="hero fade-in-up">
        <p class="subtitle">A PLATAFORMA</p>
        <h1>Sua vida.<br>Sua trilha sonora.</h1>
        <p class="desc">Catalogue, avalie e descubra álbuns na rede.</p>
    </header>

    <main id="search-section" class="fade-in-up" style="animation-delay: 0.2s;">
        <div class="search-bar-container">
            <input type="text" id="search-input" class="dark-input" placeholder="Pesquise o nome da obra..." autocomplete="off">
            
            <div class="filters" style="margin-top: 15px;">
                <select id="filter-type" class="dark-select">
                    <option value="album">Álbum</option>
                    <option value="single">Single / EP</option>
                </select>
                <input type="number" id="filter-year" class="dark-input" placeholder="Ano (Opcional)" min="1900" max="2026">
                <button id="search-btn" class="btn-primary">Buscar</button>
            </div>
        </div>

        <div id="loading-text" class="pulse-text" style="display: none;">Buscando registros...</div>
        
        <section class="grid-container" id="album-grid">
        </section>
    </main>

    <main id="network-section" class="fade-in-up" style="display: none;">
        <h2 style="margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px;">Usuários</h2>
        <div id="users-grid" class="grid-container">
        </div>
    </main>

    <div id="profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content border-glow" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Seu Perfil</h2>
                <button id="close-modal" class="btn-ghost"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="pfp-edit">
                    <img id="modal-pfp" src="https://via.placeholder.com/60" alt="Sua Foto">
                    <label for="edit-pfp-file" class="btn-ghost" style="font-size: 1rem; border: 1px solid #333; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Mudar Foto</label>
                    <input type="file" id="edit-pfp-file" accept="image/*" style="display: none;">
                </div>
                
                <label>Nome</label>
                <input type="text" id="edit-name" class="dark-input">
                
                <label>Biografia</label>
                <textarea id="edit-bio" class="dark-input" rows="3" placeholder="Escreva algo sobre você..."></textarea>
                
                <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
                    <h3 style="font-size: 1rem; margin-bottom: 10px; color: #aaa;">Obras Avaliadas</h3>
                    <div id="user-rated-albums" style="display: flex; gap: 10px; overflow-x: auto;">
                        <p style="color: #444; font-size: 0.8rem;">(Nenhuma obra carregada...)</p>
                    </div>
                </div>

                <button id="save-profile" class="btn-primary w-100">Salvar Modificações</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
